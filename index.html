<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRO Tool — Landing page audit</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      margin: 0;
      background: linear-gradient(165deg, #0f0f1a 0%, #1a1a2e 50%, #16213e 100%);
      min-height: 100vh;
      color: #e4e4ed;
    }
    .wrap {
      max-width: 640px;
      margin: 0 auto;
      padding: 2rem 1.25rem 3rem;
    }
    h1 {
      font-size: 1.75rem;
      font-weight: 700;
      margin: 0 0 0.5rem;
      letter-spacing: -0.02em;
    }
    .sub {
      color: #8b8ba7;
      font-size: 0.95rem;
      margin-bottom: 1.75rem;
    }
    .input-row {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    .input-row input {
      flex: 1;
      padding: 0.75rem 1rem;
      border: 1px solid #3d3d5c;
      border-radius: 10px;
      background: #252538;
      color: #e4e4ed;
      font-size: 1rem;
      font-family: inherit;
    }
    .input-row input::placeholder { color: #6b6b8a; }
    .input-row input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 2px rgba(99, 102, 241, 0.25);
    }
    .btn {
      padding: 0.75rem 1.25rem;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      background: #6366f1;
      color: #fff;
      white-space: nowrap;
    }
    .btn:hover { background: #5558e3; }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .result {
      margin-top: 1.5rem;
      background: #1e1e32;
      border-radius: 12px;
      border: 1px solid #2d2d44;
      overflow: hidden;
    }
    .result-header {
      padding: 1rem 1.25rem;
      border-bottom: 1px solid #2d2d44;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .section {
      padding: 0.75rem 1.25rem;
      font-weight: 700;
      font-size: 0.85rem;
      color: #818cf8;
      border-bottom: 1px solid #252538;
    }
    .result-header a { color: #818cf8; text-decoration: none; }
    .result-header a:hover { text-decoration: underline; }
    .checks {
      padding: 0.5rem 0;
    }
    .check {
      display: flex;
      align-items: flex-start;
      gap: 0.75rem;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid #252538;
    }
    .check:last-child { border-bottom: none; }
    .icon {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .icon.pass { background: #065f46; color: #6ee7b7; }
    .icon.warn { background: #78350f; color: #fcd34d; }
    .icon.fail { background: #7f1d1d; color: #fca5a5; }
    .icon.info { background: #1e3a5f; color: #93c5fd; }
    .check-body { flex: 1; min-width: 0; }
    .check-name { font-weight: 600; margin-bottom: 0.2rem; }
    .check-msg { color: #8b8ba7; font-size: 0.9rem; }
    .check-value { margin-top: 0.35rem; font-size: 0.85rem; color: #a5b4fc; word-break: break-all; }
    .error-box {
      padding: 1rem 1.25rem;
      background: #2d1f1f;
      border: 1px solid #5c2d2d;
      border-radius: 10px;
      color: #fca5a5;
      margin-top: 1rem;
    }
    .footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.85rem;
      color: #6b6b8a;
    }
    .footer a { color: #818cf8; text-decoration: none; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>CRO Tool</h1>
    <p class="sub">Audit af landingsside: titel, meta, H1, viewport, CTA, formularer og mere.</p>

    <div class="input-row">
      <input
        type="url"
        id="url"
        placeholder="https://eksempel.dk/landing"
        autocomplete="url"
      >
      <button type="button" class="btn" id="run">Analyser</button>
    </div>

    <div id="out"></div>

    <footer class="footer">
      <a href="https://github.com/Frederikhs11061/claudeadtool">Claude Ads · GitHub</a>
    </footer>
  </div>

  <script>
    const urlInput = document.getElementById('url');
    const runBtn = document.getElementById('run');
    const out = document.getElementById('out');

    function renderResult(json) {
      if (json.error) {
        out.innerHTML = '<div class="error-box">' + escapeHtml(json.error) + '</div>';
        return;
      }
      const d = json.data || {};
      const grades = json.grades || {};
      let html = '<div class="result">';
      html += '<div class="result-header"><span>Landing Page Quality Analysis —</span> <a href="' + escapeHtml(json.url) + '" target="_blank" rel="noopener">' + escapeHtml(json.url) + '</a></div>';

      html += '<div class="section">Content</div>';
      html += '<div class="check"><span class="icon info">i</span><div class="check-body"><div class="check-name">Title</div><div class="check-value">' + escapeHtml(d.content?.title || '—') + '</div></div></div>';
      html += '<div class="check"><span class="icon ' + (d.content?.h1 ? 'pass' : 'fail') + '">' + (d.content?.h1 ? '✓' : '✕') + '</span><div class="check-body"><div class="check-name">H1</div><div class="check-value">' + escapeHtml(d.content?.h1 || 'MISSING') + '</div></div></div>';
      html += '<div class="check"><span class="icon info">i</span><div class="check-body"><div class="check-name">Words</div><div class="check-value">' + (d.content?.word_count ?? 0) + '</div></div></div>';

      html += '<div class="section">Conversion Elements</div>';
      html += '<div class="check"><span class="icon ' + (grades.cta_above_fold === 'PASS' ? 'pass' : 'fail') + '">' + (grades.cta_above_fold === 'PASS' ? '✓' : '✕') + '</span><div class="check-body"><div class="check-name">CTA Above Fold</div><div class="check-msg">' + (grades.cta_above_fold === 'PASS' ? 'Y' : 'N') + '</div></div></div>';
      html += '<div class="check"><span class="icon ' + (d.conversion?.form_present ? 'pass' : 'info') + '">' + (d.conversion?.form_present ? '✓' : 'i') + '</span><div class="check-body"><div class="check-name">Form</div><div class="check-msg">' + (d.conversion?.form_present ? 'Y (' + (d.conversion.form_fields || 0) + ' fields)' : 'N') + '</div></div></div>';
      html += '<div class="check"><span class="icon ' + (d.conversion?.phone_number ? 'pass' : 'info') + '">' + (d.conversion?.phone_number ? '✓' : 'i') + '</span><div class="check-body"><div class="check-name">Phone</div><div class="check-msg">' + (d.conversion?.phone_number ? 'Y' : 'N') + '</div></div></div>';

      html += '<div class="section">Schema</div>';
      html += '<div class="check"><span class="icon info">i</span><div class="check-body"><div class="check-name">Types</div><div class="check-value">' + escapeHtml((d.schema?.types_found || []).join(', ') || 'None') + '</div></div></div>';

      html += '<div class="section">Audit Grades (from analyze_landing.py)</div>';
      const checks = json.checks || [];
      checks.forEach(function (c) {
        html += '<div class="check">';
        html += '<span class="icon ' + (c.status || 'info') + '">' + (c.status === 'pass' ? '✓' : c.status === 'fail' ? '✕' : c.status === 'warn' ? '!' : 'i') + '</span>';
        html += '<div class="check-body"><div class="check-name">' + escapeHtml(c.name) + '</div><div class="check-msg">' + escapeHtml(c.value || c.message) + '</div></div></div>';
      });
      html += '</div>';
      out.innerHTML = html;
    }

    function escapeHtml(s) {
      const div = document.createElement('div');
      div.textContent = s;
      return div.innerHTML;
    }

    runBtn.addEventListener('click', async function () {
      const url = urlInput.value.trim();
      if (!url) return;
      runBtn.disabled = true;
      out.innerHTML = '<div class="sub">Henter og analyserer …</div>';
      try {
        const base = window.location.origin;
        const res = await fetch(base + '/api/landing?url=' + encodeURIComponent(url));
        const text = await res.text();
        let json;
        try {
          json = JSON.parse(text);
        } catch (_) {
          renderResult({ error: 'API returnerede ikke JSON (HTTP ' + res.status + '). Prøv igen om et øjeblik.' });
          runBtn.disabled = false;
          return;
        }
        renderResult(json);
      } catch (e) {
        renderResult({ error: 'Kunne ikke kalde API: ' + e.message });
      }
      runBtn.disabled = false;
    });

    urlInput.addEventListener('keydown', function (e) {
      if (e.key === 'Enter') runBtn.click();
    });
  </script>
</body>
</html>
